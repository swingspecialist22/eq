<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>에너지 퀘스트 — 클리어!</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Do+Hyeon&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;width:100vw;height:100vh;font-family:"Do Hyeon","Malgun Gothic",sans-serif;touch-action:none;}

/* 배경 */
#bg{
  position:fixed;inset:0;
  background:url("assets/bg/clear_bg.jpg") center center / cover no-repeat;
  z-index:0;
  animation:bg-reveal 2s ease forwards;
}
@keyframes bg-reveal{from{filter:brightness(0);}to{filter:brightness(1);}}

/* 어두운 그라데이션 오버레이 — 텍스트 가독성 */
#overlay{
  position:fixed;inset:0;z-index:1;
  background:linear-gradient(
    to top,
    rgba(0,0,0,0.85) 0%,
    rgba(0,0,0,0.3) 40%,
    rgba(0,0,0,0.1) 70%,
    rgba(0,0,0,0.4) 100%
  );
}

/* 스캔라인 */
#scanline{
  position:fixed;inset:0;z-index:2;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px);
}

/* 파티클 */
#particles{position:fixed;inset:0;z-index:3;pointer-events:none;overflow:hidden;}
.particle{position:absolute;border-radius:50%;animation:float-up linear infinite;}
@keyframes float-up{
  0%{transform:translateY(100vh) scale(0);opacity:0;}
  10%{opacity:1;}
  90%{opacity:0.6;}
  100%{transform:translateY(-10vh) scale(1.5);opacity:0;}
}

/* 메인 컨텐츠 */
#main{
  position:fixed;inset:0;z-index:10;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
  padding-bottom:max(6vh,env(safe-area-inset-bottom,20px));
  padding-left:16px;padding-right:16px;
  opacity:0;animation:fade-in 1s ease 1.5s forwards;
}
@keyframes fade-in{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

/* 등급 뱃지 */
#grade-wrap{
  text-align:center;margin-bottom:16px;
}
#grade-label{
  font-size:10px;letter-spacing:4px;color:#aaa;margin-bottom:6px;
}
#grade{
  font-size:clamp(52px,12vw,88px);
  font-weight:bold;
  line-height:1;
  text-shadow:0 0 40px currentColor, 0 0 80px currentColor;
  animation:grade-pop 0.6s cubic-bezier(0.34,1.56,0.64,1) 2s both;
}
@keyframes grade-pop{from{transform:scale(0) rotate(-15deg);opacity:0;}to{transform:scale(1) rotate(0);opacity:1;}}

/* 제목 */
#clear-title{
  font-size:clamp(18px,5vw,32px);
  letter-spacing:6px;
  color:#fff;
  text-shadow:0 0 20px rgba(255,255,255,0.5);
  margin-bottom:10px;
  text-align:center;
}

/* 스토리 텍스트 */
#story-box{
  background:rgba(0,0,0,0.6);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:4px;
  padding:clamp(10px,3vw,14px) clamp(14px,4vw,22px);
  max-width:min(600px,90vw);
  margin-bottom:clamp(12px,3vw,20px);
  text-align:center;
}
#story-text{
  font-size:clamp(12px,2.5vw,14px);
  color:#ddd;
  line-height:1.9;
  white-space:pre-line;
}

/* 스탯 */
#stats{
  display:flex;gap:clamp(12px,3vw,24px);
  margin-bottom:20px;
  flex-wrap:wrap;justify-content:center;
}
.stat-chip{
  background:rgba(0,0,0,0.5);
  border:1px solid rgba(255,255,255,0.2);
  border-radius:3px;
  padding:8px 16px;
  text-align:center;
  min-width:80px;
}
.stat-label{font-size:9px;color:#888;letter-spacing:2px;margin-bottom:4px;}
.stat-value{font-size:16px;color:#fff;font-weight:bold;}

/* 버튼 */
#btn-wrap{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
.action-btn{
  font-family:"Do Hyeon","Malgun Gothic",sans-serif;
  font-size:clamp(11px,2.5vw,13px);
  letter-spacing:2px;
  padding:13px 28px;
  border-radius:3px;
  cursor:pointer;
  transition:all 0.15s;
  border:2px solid;
  min-height:48px;
  -webkit-tap-highlight-color:transparent;
}
#btn-title{
  background:transparent;
  border-color:rgba(255,255,255,0.4);
  color:rgba(255,255,255,0.7);
}
#btn-title:hover,#btn-title:active{background:rgba(255,255,255,0.1);color:#fff;}
#btn-replay{
  background:transparent;
  border-color:#44cc88;
  color:#44cc88;
}
#btn-replay:hover,#btn-replay:active{background:rgba(68,204,136,0.2);}

/* 페이드 */
#fade{position:fixed;inset:0;background:#000;z-index:100;pointer-events:none;opacity:0;transition:opacity 0.8s ease;}

/* 별 이펙트 */
.star{
  position:fixed;z-index:4;pointer-events:none;
  font-size:clamp(16px,3vw,24px);
  animation:star-burst 1.5s ease-out forwards;
}
@keyframes star-burst{
  0%{transform:scale(0) rotate(0deg);opacity:1;}
  50%{transform:scale(1.5) rotate(180deg);opacity:1;}
  100%{transform:scale(0.5) rotate(360deg) translateY(-60px);opacity:0;}
}

/* 후기 버튼 */
#btn-review{
  background:transparent;
  border-color:#ffd700;
  color:#ffd700;
}
#btn-review:hover,#btn-review:active{background:rgba(255,215,0,0.18);color:#fff;}

/* ── 후기(설문) 모달 ─────────────────────────── */
#survey-overlay{
  position:fixed;inset:0;z-index:90;
  display:none;
  background:rgba(0,0,0,0.82);
  -webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);
  overflow-y:auto;-webkit-overflow-scrolling:touch;touch-action:pan-y;
  padding:max(20px,env(safe-area-inset-top,20px)) 14px max(28px,env(safe-area-inset-bottom,20px)) 14px;
}
#survey-overlay.show{display:flex;align-items:flex-start;justify-content:center;animation:sv-fade 0.25s ease;}
@keyframes sv-fade{from{opacity:0;}to{opacity:1;}}

#survey-card{
  position:relative;width:min(560px,100%);margin:auto;
  background:linear-gradient(180deg,rgba(18,22,20,0.98),rgba(10,12,14,0.98));
  border:1px solid rgba(255,215,0,0.35);border-radius:10px;
  box-shadow:0 0 50px rgba(0,0,0,0.7),0 0 0 1px rgba(255,255,255,0.04) inset;
  padding:clamp(18px,5vw,28px);
  animation:sv-pop 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes sv-pop{from{transform:translateY(24px) scale(0.96);opacity:0;}to{transform:none;opacity:1;}}

#survey-close{
  position:absolute;top:8px;right:10px;
  background:none;border:none;color:#888;font-size:26px;line-height:1;
  width:40px;height:40px;border-radius:50%;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
#survey-close:hover,#survey-close:active{color:#fff;background:rgba(255,255,255,0.08);}

#survey-title{
  font-size:clamp(18px,4.5vw,24px);color:#ffd700;text-align:center;letter-spacing:2px;
  text-shadow:0 0 20px rgba(255,215,0,0.4);
}
#survey-desc{font-size:clamp(11px,2.6vw,13px);color:#bbb;text-align:center;line-height:1.7;margin:8px 0 4px;}

.sv-q{margin-top:clamp(14px,4vw,20px);}
.sv-label{display:block;font-size:clamp(13px,3vw,15px);color:#fff;margin-bottom:9px;}
.sv-req{color:#ff6b6b;font-size:12px;}

.sv-opts{display:flex;flex-wrap:wrap;gap:7px;}
.sv-pill{
  position:relative;cursor:pointer;user-select:none;
  font-size:clamp(11px,2.6vw,13px);color:#cfd6d2;
  border:1px solid rgba(255,255,255,0.22);border-radius:20px;
  padding:8px 14px;transition:all 0.15s;-webkit-tap-highlight-color:transparent;
}
.sv-pill input{position:absolute;opacity:0;pointer-events:none;width:0;height:0;}
.sv-pill:hover{border-color:rgba(68,204,136,0.6);}
.sv-pill.on{background:rgba(68,204,136,0.22);border-color:#44cc88;color:#fff;}

.sv-stars{display:flex;gap:6px;font-size:clamp(30px,9vw,42px);cursor:pointer;user-select:none;}
.sv-stars span{color:#3a3a3a;transition:transform 0.12s,color 0.12s,text-shadow 0.12s;-webkit-tap-highlight-color:transparent;}
.sv-stars span.on{color:#ffd700;text-shadow:0 0 14px rgba(255,215,0,0.6);}
.sv-stars span:active{transform:scale(1.25);}

.sv-ta{
  width:100%;min-height:68px;resize:vertical;
  font-family:inherit;font-size:14px;color:#fff;line-height:1.6;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.18);border-radius:6px;padding:10px 12px;
}
.sv-ta:focus{outline:none;border-color:#44cc88;background:rgba(68,204,136,0.06);}
.sv-ta::placeholder{color:#666;}

#sv-error{color:#ff6b6b;font-size:12px;text-align:center;margin-top:14px;min-height:16px;}
#survey-submit{
  display:block;width:100%;margin-top:12px;
  font-family:inherit;font-size:clamp(13px,3vw,15px);letter-spacing:2px;font-weight:bold;
  padding:14px;border-radius:6px;cursor:pointer;border:none;
  background:linear-gradient(180deg,#ffd95a,#f0a800);color:#2a1e00;
  -webkit-tap-highlight-color:transparent;transition:filter 0.15s;
}
#survey-submit:hover,#survey-submit:active{filter:brightness(1.08);}
#survey-submit:disabled{filter:grayscale(0.5) brightness(0.7);cursor:default;}

.sv-shake{animation:sv-shake 0.4s;}
@keyframes sv-shake{0%,100%{transform:none;}25%{transform:translateX(-7px);}75%{transform:translateX(7px);}}

#survey-thanks{display:none;text-align:center;padding:24px 6px 6px;}
#survey-thanks .sv-emoji{font-size:52px;animation:sv-pop 0.5s cubic-bezier(0.34,1.56,0.64,1);}
#survey-thanks .sv-th-title{font-size:clamp(17px,4vw,22px);color:#44cc88;margin:12px 0 8px;letter-spacing:1px;}
#survey-thanks .sv-th-msg{font-size:13px;color:#bbb;line-height:1.8;}
</style>
</head>
<body>

<div id="bg"></div>
<div id="overlay"></div>
<div id="scanline"></div>
<div id="particles"></div>

<div id="main">
  <div id="grade-wrap">
    <div id="grade-label">FINAL GRADE</div>
    <div id="grade">S</div>
  </div>
  <div id="clear-title">MISSION COMPLETE</div>
  <div id="story-box">
    <div id="story-text"></div>
  </div>
  <div id="stats">
    <div class="stat-chip">
      <div class="stat-label">지식 등급</div>
      <div class="stat-value" id="stat-lv">—</div>
    </div>
    <div class="stat-chip">
      <div class="stat-label">COINS</div>
      <div class="stat-value" id="stat-coin">0</div>
    </div>
    <div class="stat-chip">
      <div class="stat-label">HP</div>
      <div class="stat-value" id="stat-hp">100</div>
    </div>
  </div>
  <div id="btn-wrap">
    <button class="action-btn" id="btn-review" onclick="openSurvey()">[ 후기 남기기 ]</button>
    <button class="action-btn" id="btn-savelog" onclick="if(window.EQLog)EQLog.download()">[ 📥 결과 저장 ]</button>
    <button class="action-btn" id="btn-title" onclick="goTitle()">[ 타이틀로 ]</button>
    <button class="action-btn" id="btn-replay" onclick="goReplay()">[ 다시 도전 ]</button>
  </div>
</div>

<!-- ── 후기(설문) 모달 ─────────────────────────── -->
<div id="survey-overlay" onclick="if(event.target===this)closeSurvey();">
  <div id="survey-card">
    <button id="survey-close" onclick="closeSurvey()" aria-label="닫기">&times;</button>

    <div id="survey-title">에너지 퀘스트 후기</div>
    <div id="survey-desc">
      짧은 후기를 남겨주면 다음 게임을 만드는 데 큰 힘이 돼요.<br>
      참여해줘서 정말 고마워요! 💚
    </div>

    <form id="survey-form"
          action="https://docs.google.com/forms/d/e/1FAIpQLSf_te9U5hXyk1komBwMY0x94KV__7xOBR3CLRF6VFK8l7A8ig/formResponse"
          method="POST" target="sv-sink" onsubmit="return submitSurvey(event);">

      <div class="sv-q">
        <label class="sv-label">몇 학년이에요? <span class="sv-req">*</span></label>
        <div class="sv-opts" id="sv-grade" data-name="entry.1889307555"></div>
      </div>

      <div class="sv-q">
        <label class="sv-label">게임이 재미있었나요? (별점) <span class="sv-req">*</span></label>
        <div class="sv-stars" id="sv-stars">
          <span data-v="1">★</span><span data-v="2">★</span><span data-v="3">★</span><span data-v="4">★</span><span data-v="5">★</span>
        </div>
        <input type="hidden" name="entry.17890046" id="sv-star-input">
      </div>

      <div class="sv-q">
        <label class="sv-label">가장 기억에 남는 스테이지는? <span class="sv-req">*</span></label>
        <div class="sv-opts" id="sv-stage" data-name="entry.255427643"></div>
      </div>

      <div class="sv-q">
        <label class="sv-label">이 게임으로 새로 알게 된 에너지 이야기는?</label>
        <textarea class="sv-ta" name="entry.876340983" placeholder="자유롭게 적어주세요"></textarea>
      </div>

      <div class="sv-q">
        <label class="sv-label">다음에 할 친구에게 한마디!</label>
        <textarea class="sv-ta" name="entry.297551879" placeholder="응원 한마디를 남겨주세요"></textarea>
      </div>

      <div class="sv-q">
        <label class="sv-label">더 바라는 점 / 어려웠던 점</label>
        <textarea class="sv-ta" name="entry.1282810332" placeholder="개선했으면 하는 점을 알려주세요"></textarea>
      </div>

      <!-- 구글 폼 단일 페이지 전송용 -->
      <input type="hidden" name="fvv" value="1">
      <input type="hidden" name="pageHistory" value="0">

      <div id="sv-error"></div>
      <button type="submit" id="survey-submit">후기 보내기 ▶</button>
    </form>

    <div id="survey-thanks">
      <div class="sv-emoji">🌱</div>
      <div class="sv-th-title">소중한 후기 고마워요!</div>
      <div class="sv-th-msg">
        여러분의 한마디가 더 좋은 게임을 만듭니다.<br>
        에너지 자립의 여정에 함께해줘서 고마워요 💚
      </div>
      <div style="display:flex;justify-content:center;margin-top:22px;">
        <button class="action-btn" style="background:transparent;border-color:#44cc88;color:#44cc88;" onclick="closeSurvey()">[ 닫기 ]</button>
      </div>
    </div>
  </div>
</div>
<iframe name="sv-sink" id="sv-sink" style="display:none;" title="survey-sink"></iframe>

<div id="fade"></div>

<script src="eq-log.js"></script>
<script>
// ── 파티클 (녹색/황금 계열 — 희망적 분위기)
(function(){
  const wrap=document.getElementById('particles');
  const colors=['rgba(100,220,100,','rgba(255,200,50,','rgba(50,180,255,'];
  for(let i=0;i<20;i++){
    const p=document.createElement('div');
    p.className='particle';
    const c=colors[Math.floor(Math.random()*colors.length)];
    const sz=Math.random()*5+2;
    p.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;background:${c}${Math.random()*0.7+0.2});animation-duration:${Math.random()*7+5}s;animation-delay:${Math.random()*5}s;box-shadow:0 0 ${sz*3}px ${c}0.9);`;
    wrap.appendChild(p);
  }
})();

// ── 등급/스토리 데이터
const GRADES={
  S:{ color:'#ffd700', title:'PERFECT CLEAR', story:'블랙하트가 천천히 무릎을 꿇었다.\n\n"...인정해. 에너지는 독점하는 게 아니라\n모두가 함께 만들고 나누는 것이었어."\n\nDEC는 해산되고, 마을마다 태양광·풍력이 돌기 시작했다.\n이제 누구도 에너지로 우리를 위협할 수 없다.\n\n우리 손으로 만들고 지키는 에너지 — 에너지 자립을 이뤄냈다!\n그 위대한 설계도엔 당신의 이름이 새겨졌다.' },
  A:{ color:'#2ec4b6', title:'MISSION COMPLETE', story:'에너지 독점이 깨졌다.\n블랙하트는 도주했지만, 마을은 스스로 전기를 만들기 시작했다.\n\n신재생에너지로 이룬 "에너지 자립"의 시대가 열린다!' },
  B:{ color:'#4cc9f0', title:'CLEAR', story:'독점은 해제됐다.\n하지만 일부 지역에 피해가 남았다.\n\n더 완벽한 에너지 설계를 위한 여정은 계속된다.' },
  C:{ color:'#f4a261', title:'SURVIVED', story:'가까스로 해냈다.\n에너지 불안정이 당분간 이어지겠지만...\n\n포기하지 않은 것, 그게 가장 중요했다.' },
};

// ── localStorage에서 결과 읽기
function getGrade(hp){
  if(hp>=80) return 'S';
  if(hp>=50) return 'A';
  if(hp>=20) return 'B';
  return 'C';
}

const savedHp   = parseInt(localStorage.getItem('eq_boss_hp'))||60;
const savedLv   = parseInt(localStorage.getItem('eq_level'))||1;
const savedCoin = parseInt(localStorage.getItem('eq_coins'))||0;
const grade     = getGrade(savedHp);
const data      = GRADES[grade];

// ── UI 세팅
const $grade = document.getElementById('grade');
$grade.textContent = grade;
$grade.style.color = data.color;
if(window.EQLog)EQLog.ending(grade+'등급');

document.getElementById('clear-title').textContent = data.title;
document.getElementById('story-text').textContent  = data.story;
document.getElementById('stat-lv').textContent     = (function(){var R=['견습 공학자','수습 공학자','정식 공학자','숙련 공학자','전문 공학자','베테랑 공학자','에너지 마스터'];var c=0;for(var i=1;i<=6;i++)if(localStorage.getItem('eq_stage'+i+'_cleared'))c++;return R[Math.min(c,R.length-1)];})();
document.getElementById('stat-coin').textContent   = savedCoin;
document.getElementById('stat-hp').textContent     = savedHp + '/100';

// 등급별 테두리 색상
document.querySelectorAll('.stat-chip').forEach(el=>{
  el.style.borderColor = data.color+'66';
});

// ── 별 이펙트 (S등급일 때)
if(grade==='S'){
  setTimeout(()=>{
    const emojis=['⭐','✨','🌟','💫'];
    for(let i=0;i<12;i++){
      setTimeout(()=>{
        const s=document.createElement('div');
        s.className='star';
        s.textContent=emojis[Math.floor(Math.random()*emojis.length)];
        s.style.left=Math.random()*90+'vw';
        s.style.top=Math.random()*70+'vh';
        s.style.animationDelay='0s';
        document.body.appendChild(s);
        setTimeout(()=>s.remove(),1600);
      },i*150);
    }
  },2200);
}

// ── 버튼
function goTitle(){
  const fade=document.getElementById('fade');
  fade.style.opacity='1';
  setTimeout(()=>{ window.location.href='index.html'; },900);
}
function goReplay(){
  const fade=document.getElementById('fade');
  fade.style.opacity='1';
  setTimeout(()=>{ window.location.href='stage6_boss_battle_v4.html'; },900);
}
document.getElementById('btn-title').addEventListener('touchend',function(e){e.preventDefault();goTitle();},{passive:false});
document.getElementById('btn-replay').addEventListener('touchend',function(e){e.preventDefault();goReplay();},{passive:false});
document.getElementById('btn-review').addEventListener('touchend',function(e){e.preventDefault();openSurvey();},{passive:false});

// ── 후기(설문) 모달 ─────────────────────────────
(function(){
  const GRADE_OPTS=['중학교 1학년','중학교 2학년','중학교 3학년','고등학교 1학년','고등학교 2학년','고등학교 3학년'];
  const STAGE_OPTS=['1스테이지(태양광마을)','2스테이지(바람의 항구(풍력))','3스테이지(에너지 하베스팅 도시)','4스테이지(에너지 저장소(배터리, 수소))','5스테이지(스마트 그리드)','6스테이지(블랙하트 보스전)'];

  function esc(s){return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
  function buildPills(container,opts){
    const name=container.dataset.name;
    opts.forEach(opt=>{
      const lab=document.createElement('label');
      lab.className='sv-pill';
      lab.innerHTML='<input type="radio" name="'+name+'" value="'+esc(opt)+'">'+esc(opt);
      lab.querySelector('input').addEventListener('change',function(){
        container.querySelectorAll('.sv-pill').forEach(p=>p.classList.remove('on'));
        lab.classList.add('on');
      });
      container.appendChild(lab);
    });
  }
  buildPills(document.getElementById('sv-grade'),GRADE_OPTS);
  buildPills(document.getElementById('sv-stage'),STAGE_OPTS);

  // 별점
  const starInput=document.getElementById('sv-star-input');
  const stars=Array.prototype.slice.call(document.querySelectorAll('#sv-stars span'));
  function paint(n){stars.forEach(s=>s.classList.toggle('on',parseInt(s.dataset.v)<=n));}
  stars.forEach(function(s){
    function set(){var n=parseInt(s.dataset.v);starInput.value='★'.repeat(n);paint(n);}
    s.addEventListener('click',set);
    s.addEventListener('touchend',function(e){e.preventDefault();set();},{passive:false});
  });

  const overlay=document.getElementById('survey-overlay');
  window.openSurvey=function(){overlay.classList.add('show');overlay.scrollTop=0;};
  window.closeSurvey=function(){overlay.classList.remove('show');};

  window.submitSurvey=function(e){
    const form=document.getElementById('survey-form');
    const err=document.getElementById('sv-error');
    const need=[['entry.1889307555','학년'],['entry.17890046','별점'],['entry.255427643','기억에 남는 스테이지']];
    for(var i=0;i<need.length;i++){
      var n=need[i][0], label=need[i][1];
      var el=form.querySelector('[name="'+n+'"]');
      var ok = el && el.type==='hidden' ? !!el.value : !!form.querySelector('[name="'+n+'"]:checked');
      if(!ok){
        e.preventDefault();
        err.textContent='필수 항목 "'+label+'"을(를) 선택해 주세요.';
        var card=document.getElementById('survey-card');
        card.classList.remove('sv-shake');void card.offsetWidth;card.classList.add('sv-shake');
        return false;
      }
    }
    // 검증 통과 → 폼은 숨은 iframe(sv-sink)으로 전송되어 구글 폼에 수합됨
    err.textContent='';
    form.style.display='none';
    document.getElementById('survey-thanks').style.display='block';
    overlay.scrollTop=0;
    return true; // 기본 submit 동작 유지(iframe 전송)
  };
})();
</script>
</body>
</html>
