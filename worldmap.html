<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>에너지 퀘스트 — 에너지 여정</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Do+Hyeon&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Do Hyeon','Malgun Gothic','Apple SD Gothic Neo',sans-serif;
  background:
    radial-gradient(700px 300px at 12% -4%, rgba(255,136,0,0.12), rgba(0,0,0,0) 55%),
    radial-gradient(760px 380px at 88% 6%, rgba(68,170,255,0.11), rgba(0,0,0,0) 55%),
    radial-gradient(circle at 50% 0%,#13203a 0%,#0a0e18 60%,#06080e 100%);
  color:#e8e8e8; min-height:100vh; user-select:none;
  display:flex; flex-direction:column; align-items:center;
  padding:clamp(16px,3vh,40px) 12px; overflow-x:hidden;
}
#fx-map{position:fixed;inset:0;pointer-events:none;z-index:0;}
#title{ text-align:center; margin-bottom:clamp(16px,3vh,32px); position:relative; z-index:1; }
#title h1{ font-size:clamp(24px,3.6vw,38px); color:#ffe8c0; letter-spacing:4px;
  text-shadow:0 0 24px rgba(255,136,0,.6),0 0 60px rgba(255,136,0,.25),0 3px 0 #5a2a00; }
#title .sub{ font-size:clamp(10px,1.3vw,14px); color:#7790b0; letter-spacing:6px; margin-top:6px; }
#greet{ font-size:clamp(11px,1.4vw,15px); color:#aabbd0; margin-top:10px; }
#prog{ display:inline-block; margin-top:10px; font-size:clamp(10px,1.3vw,13px); letter-spacing:1px;
  color:#7df7a0; background:rgba(10,32,18,0.7); border:1px solid #2a6a44; border-radius:16px; padding:4px 14px; }

#journey{ position:relative; width:min(560px,94vw); display:flex; flex-direction:column; gap:clamp(10px,1.6vh,18px); z-index:1; }
/* 노드들을 잇는 에너지 라인 */
#journey::before{
  content:''; position:absolute; left:clamp(30px,7vw,46px); top:24px; bottom:24px; width:3px;
  background:linear-gradient(180deg,#ff9a2a,#eebb22,#44dd88,#38bdf8,#ff5555);
  border-radius:2px; z-index:0;
  box-shadow:0 0 12px rgba(120,180,255,.35);
  animation:lineGlow 3s ease-in-out infinite;
}
@keyframes lineGlow{0%,100%{opacity:.5}50%{opacity:.95}}
.node{
  position:relative; z-index:1; display:flex; align-items:center; gap:clamp(10px,2vw,16px);
  background:linear-gradient(180deg,rgba(26,35,58,0.95),rgba(16,22,38,0.95));
  border:2px solid #2c3a58; border-radius:14px;
  padding:clamp(10px,1.6vh,16px) clamp(12px,2vw,18px); cursor:pointer;
  transition:transform .12s, border-color .15s, box-shadow .15s;
  box-shadow:0 8px 22px rgba(0,0,0,.35);
}
.node .icon{
  flex-shrink:0; width:clamp(44px,9vw,60px); height:clamp(44px,9vw,60px); border-radius:12px;
  display:flex; align-items:center; justify-content:center; font-size:clamp(22px,4.5vw,32px);
  background:radial-gradient(circle at 35% 28%, #17223c, #0c1220); border:2px solid currentColor;
  box-shadow:0 0 16px -4px currentColor, inset 0 0 12px rgba(255,255,255,.04);
}
.node .body{ flex:1; min-width:0; }
.node .name{ font-size:clamp(14px,2vw,19px); font-weight:bold; color:#fff; }
.node .theme{ font-size:clamp(10px,1.4vw,13px); color:#9fb0c8; margin-top:2px; }
.node .badge{ flex-shrink:0; font-size:clamp(9px,1.2vw,12px); padding:4px 10px; border-radius:20px; letter-spacing:1px; font-weight:bold; }

/* 상태별 */
.node.cleared{ border-color:#3a9a5a; }
.node.cleared .badge{ background:#0d2a16; color:#7df7a0; border:1px solid #3a9a5a; box-shadow:0 0 12px rgba(61,214,122,.2); }
.node.current{ border-color:#ff8800; box-shadow:0 0 22px #ff880033, 0 8px 22px rgba(0,0,0,.35); animation:pulse 1.6s ease-in-out infinite; }
.node.current .badge{ background:#3a2200; color:#ffcc66; border:1px solid #ff8800; }
.node.locked{ cursor:default; opacity:0.5; filter:grayscale(0.6); }
.node.locked .badge{ background:#1a1f2e; color:#667; border:1px solid #33405c; }
@keyframes pulse{ 0%,100%{box-shadow:0 0 22px #ff880033;} 50%{box-shadow:0 0 30px #ff880066;} }
.node:not(.locked):hover{ transform:translateX(5px); border-color:#ffaa44; }
.node:not(.locked):active{ transform:translateX(2px) scale(0.99); }

#footer{ margin-top:clamp(20px,3vh,36px); display:flex; gap:12px; flex-wrap:wrap; justify-content:center; position:relative; z-index:1; }
.btn{
  font-family:inherit; font-size:clamp(12px,1.5vw,15px); letter-spacing:1px; cursor:pointer;
  background:rgba(10,26,48,0.5); border:2px solid #44aaff; color:#7cc2ff;
  border-radius:12px; padding:10px 22px; transition:background .15s, box-shadow .15s;
}
.btn:hover{ background:rgba(68,170,255,0.15); box-shadow:0 0 16px rgba(68,170,255,.25); }
#hint{ font-size:clamp(9px,1.1vw,12px); color:#556; margin-top:14px; text-align:center; }
</style>
</head>
<body>
  <canvas id="fx-map"></canvas>
  <div id="title">
    <h1>⚡ 에너지 여정</h1>
    <div class="sub">ENERGY QUEST · WORLD MAP</div>
    <div id="greet"></div>
    <div id="prog"></div>
  </div>

  <div id="journey"></div>

  <div id="footer">
    <button class="btn" onclick="go('dogam.html')">📚 에너지 도감</button>
    <button class="btn" onclick="go('index.html')">🏠 타이틀로</button>
  </div>
  <div id="hint">잠긴 곳(🔒)은 앞 스테이지를 깨야 열려요 · 깬 곳은 다시 들어갈 수 있어요</div>

<script>
// ── 에너지 여정 스테이지 정의 (설계: 태양광→풍력→하베스팅→저장→스마트그리드→본부) ──
const STAGES = [
  {n:1, file:'stage1.html', icon:'☀',  name:'태양의 사막',   theme:'태양광 발전',       color:'#ff8800'},
  {n:2, file:'stage2.html', icon:'🌬', name:'바람의 해안',   theme:'풍력 발전',         color:'#44aaff'},
  {n:3, file:'stage3.html', icon:'⚡', name:'발명가의 도시', theme:'에너지 하베스팅',   color:'#eebb22'},
  {n:4, file:'stage4.html', icon:'🔋', name:'공장 지대',     theme:'에너지 저장·자립',  color:'#44dd88'},
  {n:5, file:'stage5.html', icon:'🧠', name:'데이터 타워',   theme:'스마트그리드',      color:'#38bdf8'},
  {n:6, file:'stage6.html', icon:'🏛', name:'DEC 본부',      theme:'최종 결전 · 에너지 자립', color:'#ff5555'},
];

// localStorage 접근이 막힌 환경(file:// 등)에서도 안 멈추도록 안전하게 읽기
function lsGet(k){ try { return localStorage.getItem(k); } catch(e){ return null; } }
function isCleared(n){ return lsGet('eq_stage'+n+'_cleared') === '1'; }
// 엿보기 모달(아이프레임) 안에서도 부모 창을 이동시키도록 top 기준으로 이동
function go(u){ try{ (window.top||window).location.href=u; }catch(e){ location.href=u; } }

// 인사말 (캐릭터 이름 있으면)
(function(){
  const name = lsGet('eq_char_name');
  document.getElementById('greet').textContent =
    name ? `${name} 공학자의 여정` : '에너지 자립을 향한 여정';
})();

// 노드 렌더
const journey = document.getElementById('journey');
let currentAssigned = false;
STAGES.forEach(s=>{
  const cleared = isCleared(s.n);
  const unlocked = (s.n === 1) || isCleared(s.n - 1);
  // 첫 번째 '열렸지만 안 깬' 스테이지 = 현재 목표
  let state = 'locked';
  if (cleared) state = 'cleared';
  else if (unlocked && !currentAssigned) { state = 'current'; currentAssigned = true; }
  else if (unlocked) state = 'available';

  const node = document.createElement('div');
  node.className = 'node ' + (state==='available' ? '' : state);
  node.style.color = (state==='locked') ? '#556' : s.color;
  const badge = state==='cleared' ? '✓ 완료'
              : state==='current' ? '▶ 여기부터'
              : state==='available' ? '도전 가능'
              : '🔒 잠김';
  node.innerHTML =
    `<div class="icon">${state==='locked' ? '🔒' : s.icon}</div>
     <div class="body">
       <div class="name">${s.n}. ${s.name}</div>
       <div class="theme">${s.theme}</div>
     </div>
     <div class="badge">${badge}</div>`;
  if (state !== 'locked'){
    node.addEventListener('click', ()=>{ go(s.file); });
  }
  journey.appendChild(node);
});

// 진행률 배지
(function(){
  let n=0; STAGES.forEach(s=>{ if(isCleared(s.n)) n++; });
  document.getElementById('prog').textContent = '⚡ 복구한 발전 ' + n + ' / ' + STAGES.length;
})();

// 떠다니는 에너지 입자
(function(){
  const cv=document.getElementById('fx-map'); if(!cv) return;
  const c2=cv.getContext('2d');
  function rs(){ cv.width=innerWidth; cv.height=innerHeight; }
  rs(); addEventListener('resize',rs);
  const COLS=['255,170,60','120,200,255','120,240,170'];
  const P=[];
  for(let i=0;i<36;i++)P.push({
    x:Math.random(), y:Math.random(), r:.7+Math.random()*1.7,
    s:.0004+Math.random()*.0009, ph:Math.random()*6.283,
    col:COLS[Math.floor(Math.random()*COLS.length)]
  });
  (function loop(){
    c2.clearRect(0,0,cv.width,cv.height);
    const t=Date.now()/1000;
    for(const p of P){
      p.y-=p.s; if(p.y<-0.03)p.y=1.03;
      const x=(p.x+Math.sin(t*.5+p.ph)*.012)*cv.width;
      const a=.10+.20*((Math.sin(t*1.4+p.ph)+1)/2);
      c2.fillStyle='rgba('+p.col+','+a+')';
      c2.beginPath(); c2.arc(x,p.y*cv.height,p.r,0,6.283); c2.fill();
    }
    requestAnimationFrame(loop);
  })();
})();
</script>
</body>
</html>
