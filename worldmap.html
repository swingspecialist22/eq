<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>м—җл„Ҳм§Җ нҖҳмҠӨнҠё вҖ” м—җл„Ҳм§Җ м—¬м •</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Gothic+A1:wght@400;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Gothic A1','Malgun Gothic','Apple SD Gothic Neo',sans-serif;
  background:radial-gradient(circle at 50% 0%,#13203a 0%,#0a0e18 60%,#06080e 100%);
  color:#e8e8e8; min-height:100vh; user-select:none;
  display:flex; flex-direction:column; align-items:center;
  padding:clamp(16px,3vh,40px) 12px; overflow-x:hidden;
}
#title{ text-align:center; margin-bottom:clamp(16px,3vh,32px); }
#title h1{ font-size:clamp(20px,3vw,32px); color:#ff8800; text-shadow:0 0 18px #ff880077; letter-spacing:2px; }
#title .sub{ font-size:clamp(10px,1.3vw,14px); color:#7790b0; letter-spacing:4px; margin-top:4px; }
#greet{ font-size:clamp(11px,1.4vw,15px); color:#aabbd0; margin-top:10px; }

#journey{ position:relative; width:min(560px,94vw); display:flex; flex-direction:column; gap:clamp(10px,1.6vh,18px); }
/* л…ёл“ңл“Өмқ„ мһҮлҠ” м„ёлЎңм„  */
#journey::before{
  content:''; position:absolute; left:clamp(30px,7vw,46px); top:24px; bottom:24px; width:3px;
  background:linear-gradient(#3a4a6a,#26304a); border-radius:2px; z-index:0;
}
.node{
  position:relative; z-index:1; display:flex; align-items:center; gap:clamp(10px,2vw,16px);
  background:rgba(20,28,46,0.92); border:2px solid #2c3a58; border-radius:12px;
  padding:clamp(10px,1.6vh,16px) clamp(12px,2vw,18px); cursor:pointer;
  transition:transform .12s, border-color .15s, box-shadow .15s;
}
.node .icon{
  flex-shrink:0; width:clamp(44px,9vw,60px); height:clamp(44px,9vw,60px); border-radius:10px;
  display:flex; align-items:center; justify-content:center; font-size:clamp(22px,4.5vw,32px);
  background:#0d1424; border:2px solid currentColor;
}
.node .body{ flex:1; min-width:0; }
.node .name{ font-size:clamp(14px,2vw,19px); font-weight:bold; color:#fff; }
.node .theme{ font-size:clamp(10px,1.4vw,13px); color:#9fb0c8; margin-top:2px; }
.node .badge{ flex-shrink:0; font-size:clamp(9px,1.2vw,12px); padding:4px 10px; border-radius:20px; letter-spacing:1px; font-weight:bold; }

/* мғҒнғңлі„ */
.node.cleared{ border-color:#3a9a5a; }
.node.cleared .badge{ background:#0d2a16; color:#7df7a0; border:1px solid #3a9a5a; }
.node.current{ border-color:#ff8800; box-shadow:0 0 22px #ff880033; animation:pulse 1.6s ease-in-out infinite; }
.node.current .badge{ background:#3a2200; color:#ffcc66; border:1px solid #ff8800; }
.node.locked{ cursor:default; opacity:0.5; filter:grayscale(0.6); }
.node.locked .badge{ background:#1a1f2e; color:#667; border:1px solid #33405c; }
@keyframes pulse{ 0%,100%{box-shadow:0 0 22px #ff880033;} 50%{box-shadow:0 0 30px #ff880066;} }
.node:not(.locked):hover{ transform:translateX(5px); border-color:#ffaa44; }
.node:not(.locked):active{ transform:translateX(2px) scale(0.99); }

#footer{ margin-top:clamp(20px,3vh,36px); display:flex; gap:12px; flex-wrap:wrap; justify-content:center; }
.btn{
  font-family:inherit; font-size:clamp(12px,1.5vw,15px); letter-spacing:1px; cursor:pointer;
  background:transparent; border:2px solid #44aaff; color:#7cc2ff;
  border-radius:8px; padding:10px 22px; transition:background .15s;
}
.btn:hover{ background:rgba(68,170,255,0.15); }
#hint{ font-size:clamp(9px,1.1vw,12px); color:#556; margin-top:14px; text-align:center; }
</style>
</head>
<body>
  <div id="title">
    <h1>вҡЎ м—җл„Ҳм§Җ м—¬м •</h1>
    <div class="sub">ENERGY QUEST В· WORLD MAP</div>
    <div id="greet"></div>
  </div>

  <div id="journey"></div>

  <div id="footer">
    <button class="btn" onclick="go('dogam.html')">рҹ“ҡ м—җл„Ҳм§Җ лҸ„к°җ</button>
    <button class="btn" onclick="go('index.html')">рҹҸ  нғҖмқҙнӢҖлЎң</button>
  </div>
  <div id="hint">мһ кёҙ кіі(рҹ”’)мқҖ м•һ мҠӨн…Ңмқҙм§ҖлҘј к№Ём•ј м—ҙл Өмҡ” В· к№¬ кіімқҖ лӢӨмӢң л“Өм–ҙк°Ҳ мҲҳ мһҲм–ҙмҡ”</div>

<script>
// в”Җв”Җ м—җл„Ҳм§Җ м—¬м • мҠӨн…Ңмқҙм§Җ м •мқҳ (м„Өкі„: нғңм–‘кҙ‘вҶ’н’Қл ҘвҶ’н•ҳлІ мҠӨнҢ…вҶ’м ҖмһҘвҶ’мҠӨл§ҲнҠёк·ёлҰ¬л“ңвҶ’ліёл¶Җ) в”Җв”Җ
const STAGES = [
  {n:1, file:'stage1.html', icon:'вҳҖ',  name:'нғңм–‘мқҳ мӮ¬л§ү',   theme:'нғңм–‘кҙ‘ л°ңм „',       color:'#ff8800'},
  {n:2, file:'stage2.html', icon:'рҹҢ¬', name:'л°”лһҢмқҳ н•ҙм•Ҳ',   theme:'н’Қл Ҙ л°ңм „',         color:'#44aaff'},
  {n:3, file:'stage3.html', icon:'вҡЎ', name:'л°ңлӘ…к°Җмқҳ лҸ„мӢң', theme:'м—җл„Ҳм§Җ н•ҳлІ мҠӨнҢ…',   color:'#eebb22'},
  {n:4, file:'stage4.html', icon:'рҹ”Ӣ', name:'кіөмһҘ м§ҖлҢҖ',     theme:'м—җл„Ҳм§Җ м ҖмһҘВ·мһҗлҰҪ',  color:'#44dd88'},
  {n:5, file:'stage5.html', icon:'рҹ§ ', name:'лҚ°мқҙн„° нғҖмӣҢ',   theme:'мҠӨл§ҲнҠёк·ёлҰ¬л“ң',      color:'#38bdf8'},
  {n:6, file:'stage6.html', icon:'рҹҸӣ', name:'DEC ліёл¶Җ',      theme:'мөңмў… кІ°м „ В· м—җл„Ҳм§Җ мһҗлҰҪ', color:'#ff5555'},
];

// localStorage м ‘к·јмқҙ л§үнһҢ нҷҳкІҪ(file:// л“ұ)м—җм„ңлҸ„ м•Ҳ л©Ҳм¶”лҸ„лЎқ м•Ҳм „н•ҳкІҢ мқҪкё°
function lsGet(k){ try { return localStorage.getItem(k); } catch(e){ return null; } }
function isCleared(n){ return lsGet('eq_stage'+n+'_cleared') === '1'; }
// м—ҝліҙкё° лӘЁлӢ¬(м•„мқҙн”„л Ҳмһ„) м•Ҳм—җм„ңлҸ„ л¶ҖлӘЁ м°Ҫмқ„ мқҙлҸҷмӢңнӮӨлҸ„лЎқ top кё°мӨҖмңјлЎң мқҙлҸҷ
function go(u){ try{ (window.top||window).location.href=u; }catch(e){ location.href=u; } }

// мқёмӮ¬л§җ (мәҗлҰӯн„° мқҙлҰ„ мһҲмңјл©ҙ)
(function(){
  const name = lsGet('eq_char_name');
  document.getElementById('greet').textContent =
    name ? `${name} кіөн•ҷмһҗмқҳ м—¬м •` : 'м—җл„Ҳм§Җ мһҗлҰҪмқ„ н–Ҙн•ң м—¬м •';
})();

// л…ёл“ң л ҢлҚ”
const journey = document.getElementById('journey');
let currentAssigned = false;
STAGES.forEach(s=>{
  const cleared = isCleared(s.n);
  const unlocked = (s.n === 1) || isCleared(s.n - 1);
  // мІ« лІҲм§ё 'м—ҙл ём§Җл§Ң м•Ҳ к№¬' мҠӨн…Ңмқҙм§Җ = нҳ„мһ¬ лӘ©н‘ң
  let state = 'locked';
  if (cleared) state = 'cleared';
  else if (unlocked && !currentAssigned) { state = 'current'; currentAssigned = true; }
  else if (unlocked) state = 'available';

  const node = document.createElement('div');
  node.className = 'node ' + (state==='available' ? '' : state);
  node.style.color = (state==='locked') ? '#556' : s.color;
  const badge = state==='cleared' ? 'вң“ мҷ„лЈҢ'
              : state==='current' ? 'в–¶ м—¬кё°л¶Җн„°'
              : state==='available' ? 'лҸ„м „ к°ҖлҠҘ'
              : 'рҹ”’ мһ к№Җ';
  node.innerHTML =
    `<div class="icon">${state==='locked' ? 'рҹ”’' : s.icon}</div>
     <div class="body">
       <div class="name">${s.n}. ${s.name}</div>
       <div class="theme">${s.theme}</div>
     </div>
     <div class="badge">${badge}</div>`;
  if (state !== 'locked'){
    node.addEventListener('click', ()=>{ go(s.file); });
  }
  journey.appendChild(node);
});
</script>
</body>
</html>
