#bg-scanline{position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px);pointer-events:none;z-index:1;}

/* 에너지 글로우 파티클 */
#particles{position:fixed;inset:0;z-index:2;pointer-events:none;overflow:hidden;}
.particle{position:absolute;border-radius:50%;animation:float linear infinite;}
@keyframes float{0%{transform:translateY(100vh) scale(0);opacity:0;}10%{opacity:1;}90%{opacity:0.5;}100%{transform:translateY(-20vh) scale(1.5);opacity:0;}}

/* 블랙하트 캐릭터 */
#blackheart{
  position:fixed;
  right:-30%;
  bottom:0;
  height:100vh;
  max-height:100vh;
  object-fit:contain;
  object-position:bottom;
  z-index:10;
  filter:drop-shadow(-20px 0 40px rgba(180,0,255,0.4)) drop-shadow(0 0 60px rgba(220,30,30,0.3));
  transition:right 1.2s cubic-bezier(0.22,1,0.36,1),opacity 0.8s ease;
  opacity:0;
}
#blackheart.show{right:-5%;opacity:1;}

/* 빨간 눈 글로우 효과 */
#eye-glow{
  position:fixed;
  z-index:11;
  pointer-events:none;
  width:70px;height:35px;
  background:radial-gradient(ellipse,rgba(255,30,30,0.85) 0%,transparent 70%);
  border-radius:50%;
  animation:eyepulse 2s ease-in-out infinite;
  display:none;
  right:28%;
  top:22%;
}
@keyframes eyepulse{0%,100%{opacity:0.6;transform:scale(1);}50%{opacity:1;transform:scale(1.3);}}

/* 상단 DEC 로고 / 타이틀 */
#top-bar{
  position:fixed;top:0;left:0;right:0;
  padding:16px 24px;
  display:flex;align-items:center;gap:12px;
  background:linear-gradient(180deg,rgba(0,0,0,0.8) 0%,transparent 100%);
  z-index:20;
  opacity:0;transition:opacity 1s ease;
}
#top-bar.show{opacity:1;}
#dec-logo{
  font-size:11px;letter-spacing:4px;color:#cc0000;
  border:1px solid #cc000066;padding:4px 12px;border-radius:2px;
  text-shadow:0 0 10px #cc000088;
}
#stage-label{font-size:11px;color:#555;letter-spacing:2px;}

/* 대화창 */
#dialog-wrap{
  position:fixed;bottom:0;left:0;right:0;
  z-index:30;
  padding:0 0 env(safe-area-inset-bottom,0);
}
#dialog-box{
  background:linear-gradient(180deg,rgba(6,0,14,0.92) 0%,rgba(10,0,20,0.98) 100%);
  border-top:2px solid #cc0000;
  padding:18px 24px 22px;
  min-height:130px;
  position:relative;
  overflow:hidden;
}
#dialog-box::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,#cc0000,#aa00ff,transparent);
}
#name-plate{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(180,0,0,0.2);border:1px solid #cc000066;
  padding:4px 14px;border-radius:2px;margin-bottom:10px;
}
#speaker-name{font-size:12px;color:#ff4444;letter-spacing:2px;font-weight:bold;}
#speaker-dot{width:6px;height:6px;border-radius:50%;background:#ff4444;animation:dot-pulse 1s ease-in-out infinite;}
@keyframes dot-pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
#dialog-text{
  font-size:15px;line-height:1.85;color:#eeddf8;
  min-height:52px;letter-spacing:0.3px;
}
#dialog-continue{
  position:absolute;bottom:18px;right:22px;
  font-size:10px;color:#553366;letter-spacing:1px;
  animation:blink .8s step-end infinite;display:none;
}
@keyframes blink{50%{opacity:0;}}

/* 선택지 */
#choices{
  display:none;
  flex-direction:column;gap:8px;
  margin-top:14px;
}
.choice-btn{
  background:rgba(100,0,150,0.15);
  border:1px solid #441166;
  border-radius:3px;
  padding:12px 18px;
  color:#cc99ee;font-size:13px;
  cursor:pointer;text-align:left;
  transition:all 0.15s;
  display:flex;align-items:center;gap:10px;
  font-family:'Courier New',monospace;
}
.choice-btn:hover,.choice-btn:active{
  background:rgba(150,0,200,0.3);
  border-color:#cc44ff;color:#fff;
  transform:translateX(4px);
}
.choice-num{
  font-size:10px;color:#663388;
  border:1px solid #441166;
  width:20px;height:20px;display:flex;align-items:center;justify-content:center;
  border-radius:2px;flex-shrink:0;
}

/* 스킵 버튼 */
#skip-btn{
  position:fixed;top:16px;right:20px;z-index:50;
  font-size:10px;color:#333;letter-spacing:1px;
  cursor:pointer;padding:8px 14px;
  border:1px solid #222;border-radius:2px;
  transition:all 0.15s;font-family:'Courier New',monospace;
  min-height:44px;display:flex;align-items:center;
}
#skip-btn:hover{color:#666;border-color:#444;}

/* 화면 전환 오버레이 */
#fade{position:fixed;inset:0;background:#000;z-index:100;pointer-events:none;opacity:0;transition:opacity 0.8s ease;}

/* 도입 텍스트 */
#intro-text{
  position:fixed;inset:0;z-index:15;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  opacity:0;transition:opacity 0.8s;
}
#intro-title{
  font-size:clamp(20px,4vw,32px);letter-spacing:8px;color:#cc0000;
  text-shadow:0 0 30px #cc000088,0 0 60px #cc000044;
  margin-bottom:12px;
}
#intro-sub{font-size:clamp(11px,2vw,14px);letter-spacing:4px;color:#441122;}
</style>
</head>

</div>

<div id="dialog-wrap">
  <div id="dialog-box">
    <div id="name-plate">
      <div id="speaker-dot"></div>
      <div id="speaker-name">CEO 블랙하트</div>
    </div>
    <div id="dialog-text"></div>
    <div id="dialog-continue">[ 탭하여 계속 ]</div>
    <div id="choices"></div>
  </div>
</div>

<button id="skip-btn" onclick="skipCutscene()">SKIP ▷</button>
<div id="fade"></div>

<script>
// ── 파티클 생성
(function(){
  const wrap=document.getElementById('particles');
  const colors=['rgba(180,0,255,','rgba(220,30,30,','rgba(100,0,200,'];
  for(let i=0;i<18;i++){
    const p=document.createElement('div');
    p.className='particle';
    const c=colors[Math.floor(Math.random()*colors.length)];
    const sz=Math.random()*4+2;
    p.style.cssText=`
      width:${sz}px;height:${sz}px;
      left:${Math.random()*100}%;
      background:${c}${Math.random()*0.6+0.2});
      animation-duration:${Math.random()*8+6}s;
      animation-delay:${Math.random()*6}s;
      box-shadow:0 0 ${sz*3}px ${c}0.8);
    `;
    wrap.appendChild(p);
  }
})();

// ── 대화 데이터
const SCRIPT=[
  {phase:'intro'},  // 특수: 인트로 연출
  {
    speaker:'CEO 블랙하트',
    lines:[
      '...드디어 왔군.',
      '여기까지 올 줄은 몰랐어.',
    ]
  },
  {
    speaker:'CEO 블랙하트',
    lines:[
      '이 세계의 에너지는 전부 내 손 안에 있어.',
      '재생에너지? 태양광? 풍력?',
      '전부 내가 통제하고 있지.',
    ]
  },
  {
    speaker:'선택',
    isChoice:true,
    choices:[
      {text:'두고 볼 수 없어. 막겠어.', next:'fight'},
      {text:'왜 이런 짓을 하는 거야?', next:'why'},
    ]
  },
  {
    id:'fight',
    speaker:'CEO 블랙하트',
    lines:[
      '흥... 막겠다고?',
      '지금까지 배운 에너지 지식으로?',
      '한번 해봐. 이 블랙하트를 이길 수 있다면.',
    ]
  },
  {
    id:'why',
    speaker:'CEO 블랙하트',
    lines:[
      '이유? 간단해.',
      '에너지를 가진 자가 세상을 지배하는 거야.',
      '재생에너지가 퍼지면 내 독점이 끝나거든.',
      '그래서 막는 거야. 영원히.',
    ]
  },
  {phase:'end'}
];

// ── 상태
const $text=document.getElementById('dialog-text');
const $continue=document.getElementById('dialog-continue');
const $choices=document.getElementById('choices');
const $bh=document.getElementById('blackheart');
const $fade=document.getElementById('fade');

let scriptIdx=0, lineIdx=0, typing=false, typingTimer=null;
let currentLines=[], choiceResult=null;
let flatScript=[];

// 선택지 처리를 위해 flat하게 펼치기
function buildFlat(){
  // intro → 대화1 → 대화2 → 선택 → fight or why → end
  flatScript=[
    {phase:'intro'},
    {speaker:'CEO 블랙하트',lines:['...드디어 왔군.','여기까지 올 줄은 몰랐어.']},
    {speaker:'CEO 블랙하트',lines:['이 세계의 에너지는 전부 내 손 안에 있어.','재생에너지? 태양광? 풍력?','전부 내가 통제하고 있지.']},
    {isChoice:true,choices:[
      {text:'두고 볼 수 없어. 막겠어.'},
      {text:'왜 이런 짓을 하는 거야?'},
    ]},
    // fight 응답
    {speaker:'CEO 블랙하트',lines:['흥... 막겠다고?','지금까지 배운 에너지 지식으로?','한번 해봐. 이 블랙하트를 이길 수 있다면.'],id:'fight'},
    // why 응답
    {speaker:'CEO 블랙하트',lines:['이유? 간단해.','에너지를 가진 자가 세상을 지배하는 거야.','재생에너지가 퍼지면 내 독점이 끝나거든.','그래서 막는 거야. 영원히.'],id:'why'},
    {phase:'end'}
  ];
}
buildFlat();

let curIdx=0; // flatScript index
let pendingChoice=null; // 선택 결과

function nextScene(){
  const scene=flatScript[curIdx];
  if(!scene) return;

  if(scene.phase==='intro'){
    playIntro();
    return;
  }
  if(scene.phase==='end'){
    goToGame();
    return;
  }
  if(scene.isChoice){
    showChoices(scene.choices);
    return;
  }
  // 일반 대화
  currentLines=scene.lines;
  lineIdx=0;
  typeNextLine();
}

// ── 인트로 연출
function playIntro(){
  const intro=document.getElementById('intro-text');
  intro.style.opacity='1';
  setTimeout(()=>{
    intro.style.opacity='0';
    setTimeout(()=>{
      intro.style.display='none';
      document.getElementById('top-bar').classList.add('show');
      // 블랙하트 슬라이드 인
      setTimeout(()=>{
        $bh.classList.add('show');
        setTimeout(()=>{
          document.getElementById('eye-glow').style.display='block';
          curIdx++;
          nextScene();
        },800);
      },400);
    },800);
  },2000);
}

// ── 타이핑
function typeNextLine(){
  if(lineIdx >= currentLines.length){
    // 대화 블록 끝
    $continue.style.display='block';
    typing=false;
    return;
  }
  $continue.style.display='none';
  $choices.style.display='none';
  const line=currentLines[lineIdx];
  $text.textContent='';
  typing=true;
  let ci=0;
  typingTimer=setInterval(()=>{
    $text.textContent=line.slice(0,ci+1)+'▮';
    ci++;
    if(ci>=line.length){
      $text.textContent=line;
      clearInterval(typingTimer);
      typing=false;
      lineIdx++;
      if(lineIdx>=currentLines.length){
        $continue.style.display='block';
      } else {
        setTimeout(typeNextLine,400);
      }
    }
  },36);
}

function skipTyping(){
  if(typing){
    clearInterval(typingTimer);
    $text.textContent=currentLines[lineIdx-1]||currentLines[lineIdx]||'';
    typing=false;
    lineIdx=currentLines.length;
    $continue.style.display='block';
    return true;
  }
  return false;
}

// ── 탭/클릭으로 진행
function onTap(){
  if(skipTyping()) return;
  if(flatScript[curIdx]&&flatScript[curIdx].isChoice) return;
  $continue.style.display='none';
  curIdx++;
  // 선택 결과에 따라 건너뛰기
  if(pendingChoice!==null){
    const skip=pendingChoice===0?'why':'fight'; // 반대 건너뜀
    while(curIdx<flatScript.length && flatScript[curIdx].id===skip) curIdx++;
    pendingChoice=null;
  }
  nextScene();
}

document.getElementById('dialog-box').addEventListener('click', onTap);
document.getElementById('dialog-box').addEventListener('touchend',e=>{e.preventDefault();onTap();},{passive:false});
document.addEventListener('keydown',e=>{if(e.key===' '||e.key==='Enter')onTap();});

// ── 선택지
function showChoices(choices){
  $text.textContent='어떻게 하겠어?';
  $choices.innerHTML='';
  $choices.style.display='flex';
  $continue.style.display='none';
  choices.forEach((c,i)=>{
    const btn=document.createElement('button');
    btn.className='choice-btn';
    btn.innerHTML=`<span class="choice-num">${i+1}</span>${c.text}`;
    btn.addEventListener('click',()=>selectChoice(i));
    btn.addEventListener('touchend',e=>{e.preventDefault();selectChoice(i);},{passive:false});
    $choices.appendChild(btn);
  });
  // 키보드 1,2
  document.addEventListener('keydown',onChoiceKey);
}
function onChoiceKey(e){
  if(e.key==='1'){selectChoice(0);}
  if(e.key==='2'){selectChoice(1);}
}
function selectChoice(i){
  document.removeEventListener('keydown',onChoiceKey);
  pendingChoice=i;
  $choices.style.display='none';
  curIdx++;
  // 선택에 따라 fight 또는 why로
  const target=i===0?'fight':'why';
  while(curIdx<flatScript.length && flatScript[curIdx].id && flatScript[curIdx].id!==target) curIdx++;
  nextScene();
}

// ── 게임으로 이동
function goToGame(){
  $fade.style.opacity='1';
  setTimeout(()=>{window.location.href='stage6.html';},900);
}

// ── 스킵
function skipCutscene(){
  clearInterval(typingTimer);
  $fade.style.opacity='1';
  setTimeout(()=>{window.location.href='stage6.html';},500);
}

// ── 시작
nextScene();
</script>
</body>
</html>
