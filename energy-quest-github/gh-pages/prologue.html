<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>에너지 퀘스트 — 프롤로그</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Courier New',monospace;user-select:none;overflow:hidden;padding-top:8px;}
#game-wrapper{position:relative;}
#game-canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;}

/* 대화창 */
#dialog-box{
  position:absolute;bottom:0;left:0;right:0;
  background:rgba(8,5,2,0.97);border-top:2px solid #604020;
  padding:12px 18px 14px;display:none;font-size:12px;line-height:1.8;min-height:72px;z-index:10;
}
#dialog-speaker{color:#ff8800;font-weight:bold;margin-bottom:3px;font-size:11px;letter-spacing:1px;}
#dialog-text{color:#e8e8e8;white-space:pre-wrap;min-height:36px;}
#dialog-continue{color:#555;font-size:10px;text-align:right;margin-top:4px;animation:blink .9s step-end infinite;}
@keyframes blink{50%{opacity:0;}}

/* 건너뛰기 */
#skip-btn{
  position:absolute;top:12px;right:12px;
  background:rgba(0,0,0,0.7);border:1px solid #443322;
  color:#886644;font-family:'Courier New',monospace;font-size:10px;
  padding:5px 12px;border-radius:3px;cursor:pointer;letter-spacing:1px;z-index:20;
  transition:border-color .15s,color .15s;
}
#skip-btn:hover{border-color:#886644;color:#ccaa77;}

/* 씬 타이틀 오버레이 */
#scene-title{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:15;
  pointer-events:none;opacity:0;transition:opacity .6s;
}
#scene-title.show{opacity:1;}
#scene-title .st-label{font-size:10px;letter-spacing:4px;color:#ff8800;margin-bottom:8px;}
#scene-title .st-text{font-size:18px;color:#ffe8aa;letter-spacing:3px;font-weight:bold;}

/* 블랙아웃 오버레이 */
#blackout{position:absolute;inset:0;background:#000;opacity:0;pointer-events:none;z-index:12;transition:opacity .8s;}
#blackout.on{opacity:1;}

/* 화면 전환 */
#transition{position:fixed;inset:0;background:#000;opacity:0;pointer-events:none;z-index:100;transition:opacity .6s;}
#transition.go{opacity:1;pointer-events:all;}

/* DEC 경고 오버레이 */
#dec-alert{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  z-index:14;opacity:0;pointer-events:none;transition:opacity .4s;
}
#dec-alert.show{opacity:1;}
#dec-alert-box{
  background:rgba(20,0,0,0.92);border:2px solid #cc1111;border-radius:6px;
  padding:18px 36px;text-align:center;
}
#dec-alert-box .da-label{font-size:9px;letter-spacing:4px;color:#cc1111;margin-bottom:6px;}
#dec-alert-box .da-text{font-size:20px;color:#ff4444;font-weight:bold;letter-spacing:4px;}
#dec-alert-box .da-sub{font-size:10px;color:#884444;margin-top:6px;letter-spacing:2px;}
</style>
<link rel="manifest" href="/manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#ff8800">
</head>
<body>

<div id="transition"></div>

<script>

// ═══════════════════════════════════════════════════════
// 픽셀아트 헬퍼

function px(bx,by,sc,x,y,w,h,c,o){
  o=o||'#111';
  ctx.fillStyle=o; ctx.fillRect((bx+x-1)*sc,(by+y-1)*sc,(w+2)*sc,(h+2)*sc);
  ctx.fillStyle=c; ctx.fillRect((bx+x)*sc,(by+y)*sc,w*sc,h*sc);
}
function fi(bx,by,sc,x,y,w,h,c){
  ctx.fillStyle=c; ctx.fillRect((bx+x)*sc,(by+y)*sc,w*sc,h*sc);
}

var DRAW_FNS={haetsal:drawHaetsal,nari:drawNari,nuri:drawNuri,saebyeok:drawSaebyeok};

// ═══════════════════════════════════════════════════════

// 타일 ID
var T={GRASS:0,PATH:1,HOUSE:2,TREE:3,WALL:4,PLAZA:5,DARK:6,FENCE:7,FLOWER:8,WELL:9,BARREL:10};

function drawTile(id,sx,sy){
  var s=TS;
  ctx.save(); ctx.translate(sx,sy);
  switch(id){
    case T.GRASS:
      ctx.fillStyle='#2a5a18'; ctx.fillRect(0,0,s,s);
      ctx.fillStyle='#336622';
      for(var i=0;i<6;i++){ctx.fillRect(4+i*8,6,2,3);ctx.fillRect(6+i*8,16,2,4);ctx.fillRect(3+i*8,28,2,3);ctx.fillRect(7+i*7,38,2,4);}
      break;
    case T.PATH:
      ctx.fillStyle='#c8a060'; ctx.fillRect(0,0,s,s);
      ctx.fillStyle='#d4aa70'; ctx.fillRect(3,3,s-6,s-6);
      ctx.strokeStyle='#b89050';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(0,s/2);ctx.lineTo(s,s/2);ctx.stroke();
      break;
    case T.HOUSE:
      ctx.fillStyle='#c8783a'; ctx.fillRect(0,0,s,s);
      ctx.fillStyle='#aa5a22'; ctx.fillRect(4,s/2,s-8,s/2-4);
      ctx.fillStyle='#e8aa55';
      ctx.beginPath();ctx.moveTo(s/2,4);ctx.lineTo(4,s/2);ctx.lineTo(s-4,s/2);ctx.closePath();ctx.fill();
      ctx.fillStyle='#88ccff'; ctx.fillRect(s/2-8,s/2+6,10,10);
      ctx.strokeStyle='#5a3a18';ctx.lineWidth=1;ctx.strokeRect(s/2-8,s/2+6,10,10);
      break;
    case T.TREE:
      ctx.fillStyle='#2a5a18'; ctx.fillRect(0,0,s,s);
      ctx.fillStyle='#7a4a18'; ctx.fillRect(s/2-4,s/2,8,s/2-2);
      ctx.fillStyle='#1a6a10'; ctx.beginPath();ctx.arc(s/2,s/2-4,18,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#2a8a18'; ctx.beginPath();ctx.arc(s/2-4,s/2-6,12,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#3a9a28'; ctx.beginPath();ctx.arc(s/2+4,s/2-8,10,0,Math.PI*2);ctx.fill();
      break;
    case T.WALL:
      ctx.fillStyle='#a06828'; ctx.fillRect(0,0,s,s);
      ctx.fillStyle='#b8782e';
      for(var r=0;r<4;r++) for(var c=0;c<4;c++) if((r+c)%2===0) ctx.fillRect(c*12+1,r*12+1,10,10);
      break;
    case T.PLAZA:
      ctx.fillStyle='#c0a868'; ctx.fillRect(0,0,s,s);
      ctx.fillStyle='#d0b878'; ctx.fillRect(4,4,s-8,s-8);
      ctx.strokeStyle='#a89050';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(s/2,0);ctx.lineTo(s/2,s);ctx.stroke();
      ctx.beginPath();ctx.moveTo(0,s/2);ctx.lineTo(s,s/2);ctx.stroke();
      break;
    case T.DARK:
      ctx.fillStyle='#0a0a0a'; ctx.fillRect(0,0,s,s);
      ctx.fillStyle='#0f0f0f';
      for(var i=0;i<4;i++) for(var j=0;j<4;j++) if((i+j)%2===0) ctx.fillRect(i*12,j*12,12,12);
      break;
    case T.FENCE:
      ctx.fillStyle='#2a5a18'; ctx.fillRect(0,0,s,s);
      ctx.fillStyle='#8a5a28';
      ctx.fillRect(0,16,s,4); ctx.fillRect(0,28,s,4);
      for(var i=0;i<4;i++){ctx.fillRect(i*12,10,4,24);}
      break;
    case T.FLOWER:
      ctx.fillStyle='#2a5a18'; ctx.fillRect(0,0,s,s);
      for(var i=0;i<3;i++){
        ctx.fillStyle='#336622';ctx.fillRect(6+i*16,s-14,3,10);
        ctx.fillStyle=['#ff8800','#ff4488','#ffee00'][i];
        ctx.beginPath();ctx.arc(7+i*16,s-14,5,0,Math.PI*2);ctx.fill();
      }
      break;
    case T.WELL:
      ctx.fillStyle='#c0a868'; ctx.fillRect(0,0,s,s);
      ctx.fillStyle='#7a5020'; ctx.fillRect(s/2-10,s/2-2,20,16);
      ctx.fillStyle='#3a6aaa'; ctx.fillRect(s/2-8,s/2,16,12);
      ctx.fillStyle='#8a6030';
      ctx.fillRect(s/2-12,s/2-4,4,20); ctx.fillRect(s/2+8,s/2-4,4,20);
      ctx.fillRect(s/2-12,s/2-8,24,6);
      break;
    case T.BARREL:
      ctx.fillStyle='#c0a868'; ctx.fillRect(0,0,s,s);
      ctx.fillStyle='#7a4010'; ctx.fillRect(s/2-8,s/2-4,16,20);
      ctx.fillStyle='#5a3008'; ctx.fillRect(s/2-9,s/2,18,3);ctx.fillRect(s/2-9,s/2+8,18,3);
      ctx.strokeStyle='#aa6020';ctx.lineWidth=1;ctx.strokeRect(s/2-8,s/2-4,16,20);
      break;
    default:
      ctx.fillStyle='#2a5a18'; ctx.fillRect(0,0,s,s);
  }
  ctx.restore();
}

function openDialog(lines, onClose){
  dialogQueue=lines.slice();
  dialogOnClose=onClose||null;
  dialogActive=true;
  $db.style.display='block';
  nextLine();
}
function nextLine(){
  if(!dialogQueue.length){
    $db.style.display='none';
    dialogActive=false;
    if(dialogOnClose){var fn=dialogOnClose;dialogOnClose=null;fn();}
    return;
  }
  var line=dialogQueue.shift();
  $ds.textContent=line.speaker;
  twText=line.text; twIdx=0; twDone=false;
  $dt.textContent='';
}
function advanceDialog(){
  if(!dialogActive) return;
  if(!twDone){$dt.textContent=twText;twIdx=twText.length;twDone=true;return;}

var autoMoves=[];
var autoMoveCb=null;
function queueMove(who, targetX, targetY, facing, cb){
  autoMoves.push({who:who,tx:targetX,ty:targetY,facing:facing,cb:cb});
}
function processAutoMove(){
  if(!autoMoves.length) return;
  var m=autoMoves[0];
  var sp=sprites[m.who];
  if(!sp) return;
  sp.facing=m.facing||sp.facing;
  var dx=m.tx-sp.x, dy=m.ty-sp.y;
  var dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<0.05){
    sp.x=m.tx; sp.y=m.ty; sp.fr=0;
    autoMoves.shift();
    if(m.cb) m.cb();
    return;
  }
  var speed=0.04;
  sp.x+=dx/dist*speed;
  sp.y+=dy/dist*speed;
}

var globalTick=0, walkFr=0;
function gameLoop(){
  globalTick++;
  if(globalTick%18===0) walkFr=(walkFr+2)%4;

  // 자동이동 처리
  processAutoMove();
  if(autoMoves.length>0){
    var sp=sprites[autoMoves[0].who];
    if(sp) sp.fr=walkFr;
  }

  // 드론 이동
  if(drone.visible){
    drone.x+=drone.speed;
    if(drone.x>COLS+2) drone.visible=false;
  }

  // 맵 렌더
  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
  for(var r=0;r<ROWS;r++)
    for(var c=0;c<COLS;c++)
      drawTile(currentMap[r*COLS+c], c*TS, r*TS);

  // 스프라이트 렌더
  if(sprites.mom.visible) drawNPCMom(sprites.mom.x*TS, sprites.mom.y*TS, 1, 0);
  if(sprites.elder.visible) drawNPCElder(sprites.elder.x*TS, sprites.elder.y*TS, 1, 0);
  if(sprites.agent1.visible) drawNPCDECAgent(sprites.agent1.x*TS, sprites.agent1.y*TS, 1, walkFr);
  if(sprites.agent2.visible) drawNPCDECAgent(sprites.agent2.x*TS, sprites.agent2.y*TS, 1, walkFr);

  // 드론 (간단한 사각형 비행체)
  if(drone.visible){
    var dx=drone.x*TS, dy=drone.y*TS;
    ctx.fillStyle='#111';ctx.fillRect(dx-18,dy-8,36,14);
    ctx.fillStyle='#cc1111';ctx.fillRect(dx-16,dy-6,32,10);
    ctx.fillStyle='#ff2200';ctx.fillRect(dx-8,dy-4,16,6);
    ctx.fillStyle='#ff000088';ctx.fillRect(dx-22,dy-4,6,6);ctx.fillRect(dx+16,dy-4,6,6);
    // 프로펠러
    ctx.fillStyle='#888';ctx.fillRect(dx-24,dy-10,10,4);ctx.fillRect(dx+14,dy-10,10,4);
    // DEC 마크
    ctx.fillStyle='#ff0000';ctx.font='bold 8px Courier New';ctx.textAlign='center';ctx.fillText('DEC',dx,dy+1);
  }

  // 플레이어
  charDrawFn(sprites.player.x*TS, sprites.player.y*TS, 1, charPal, sprites.player.fr);

  // 타이핑 효과
  if(dialogActive && !twDone){
    twIdx+=TW_SPEED;
    if(twIdx>=twText.length){twIdx=twText.length;twDone=true;}
    $dt.textContent=twText.slice(0,Math.floor(twIdx));
  }

  requestAnimationFrame(gameLoop);
}

// ═══════════════════════════════════════════════════════
// 입력
// ═══════════════════════════════════════════════════════
function handleAdvance(){
  if(dialogActive) advanceDialog();
}
document.addEventListener('keydown',function(e){
  if(e.key===' '||e.key==='Enter') handleAdvance();
});
document.getElementById('dialog-box').addEventListener('click', handleAdvance);

document.getElementById('skip-btn').addEventListener('click',function(){
  fadeOut(function(){goToGame();});
});

// ═══════════════════════════════════════════════════════
// 시작
// ═══════════════════════════════════════════════════════
requestAnimationFrame(gameLoop);
// 잠깐 로딩 후 씬 시작
setTimeout(runScene0, 400);

// ══════════════════════════════════════════════════════════
// 반응형 스케일링 — 모니터 크기에 관계없이 꽉 차게 표시
// ══════════════════════════════════════════════════════════
(function initResponsive(){
  function fitCanvas(){
    var wrapper=document.getElementById('game-wrapper');
    if(!wrapper)return;
    var cvs=wrapper.querySelector('canvas');
    if(!cvs)return;
    var gameW=cvs.width, gameH=cvs.height;
    var CHROME=32;
    var maxW=window.innerWidth-16;
    var maxH=window.innerHeight-CHROME;
    var scaleRaw=Math.min(maxW/gameW, maxH/gameH);
    var scale=Math.round(scaleRaw*2)/2;
    scale=Math.max(0.5,scale);
    wrapper.style.transform='scale('+scale+')';
    wrapper.style.transformOrigin='top center';
    wrapper.style.marginBottom=((gameH*scale)-gameH)+'px';
    document.body.style.overflow='hidden';
  }
  fitCanvas();
  window.addEventListener('resize',fitCanvas);
})();
</script>
<script>if("serviceWorker"in navigator)navigator.serviceWorker.register("/sw.js");</script>
