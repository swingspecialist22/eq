<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>에너지 퀘스트 — 다크에너지를 막아라!</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Do+Hyeon&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{
  font-family:'Do Hyeon','Malgun Gothic','Apple SD Gothic Neo',sans-serif;
  color:#fff;overflow:hidden;user-select:none;
  background:#0b0704;
}
/* ── 배경: 노을 사막 + 어두운 베일 ── */
#bg{
  position:fixed;inset:0;z-index:0;
  background:
    linear-gradient(rgba(10,6,2,0.35) 0%, rgba(10,6,2,0.55) 55%, rgba(8,5,2,0.82) 100%),
    url('assets/bg/bg_stage1.png') center/cover no-repeat,
    radial-gradient(900px 420px at 20% 12%, rgba(255,190,90,0.30), rgba(0,0,0,0) 60%),
    linear-gradient(#3a1e08, #241206 55%, #140a04);
}
#bg::after{ /* 은은한 비네트 */
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 42%, rgba(0,0,0,0) 40%, rgba(0,0,0,0.5) 100%);
}
#fx{position:fixed;inset:0;z-index:1;pointer-events:none;}

/* ── 레이아웃 ── */
#wrap{
  position:relative;z-index:2;height:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:0;padding:24px 16px;
}
#logo{text-align:center;animation:rise .9s ease-out both;}
#logo .badge{
  display:inline-block;font-size:13px;letter-spacing:3px;color:#ffcf9a;
  background:rgba(42,20,4,0.75);border:1px solid #8a4a1a;border-radius:20px;
  padding:6px 18px;margin-bottom:18px;backdrop-filter:blur(2px);
}
#logo h1{
  font-size:clamp(44px,9vw,84px);letter-spacing:10px;line-height:1;color:#ffe8c0;
  text-shadow:0 0 34px rgba(255,136,0,.55),0 0 90px rgba(255,136,0,.25),0 4px 0 #5a2a00;
  animation:glowPulse 3.2s ease-in-out infinite;
}
#logo h1 .bolt{color:#ffd24a;text-shadow:0 0 26px rgba(255,210,74,.9);}
#logo .en{font-size:clamp(12px,2vw,17px);letter-spacing:14px;color:#ff9a2a;margin-top:12px;opacity:.95;}
#logo .theme{font-size:clamp(15px,2.6vw,21px);color:#fff;margin-top:14px;letter-spacing:1px;}
#logo .theme b{color:#ffb04a;}

/* ── 버튼 ── */
#menu{margin-top:34px;display:flex;flex-direction:column;align-items:center;gap:13px;animation:rise 1s .15s ease-out both;}
.btn{
  width:min(300px,78vw);padding:16px 18px;font-family:inherit;font-size:19px;letter-spacing:2px;
  border-radius:12px;cursor:pointer;transition:transform .12s,box-shadow .2s,background .15s;
}
.btn:active{transform:scale(.97);}
#btn-new{
  border:none;color:#2a1200;font-weight:bold;
  background:linear-gradient(180deg,#ffb04a,#ff8800 60%,#e86e00);
  box-shadow:0 6px 24px rgba(255,136,0,.4),inset 0 1px 0 rgba(255,255,255,.5);
  animation:btnBreath 2.4s ease-in-out infinite;
}
#btn-new:hover{box-shadow:0 8px 34px rgba(255,136,0,.6),inset 0 1px 0 rgba(255,255,255,.5);}
#btn-continue{
  display:none;border:1.5px solid #58b6ff;color:#bfe2ff;background:rgba(10,30,60,0.5);
  backdrop-filter:blur(2px);
}
#btn-continue:hover{background:rgba(30,70,120,0.55);}
#save-info{font-size:12.5px;color:#9c8b72;letter-spacing:1px;min-height:16px;}

/* ── 캐릭터 라인업 ── */
#cast{
  margin-top:34px;display:flex;align-items:flex-end;gap:clamp(6px,2.4vw,26px);
  animation:rise 1.1s .3s ease-out both;
}
#cast img{
  height:clamp(84px,15vh,128px);image-rendering:auto;
  filter:drop-shadow(0 10px 14px rgba(0,0,0,.55));
  animation:floaty 3s ease-in-out infinite;
}
#cast img:nth-child(2){animation-delay:.4s;}
#cast img:nth-child(3){animation-delay:.8s;}
#cast img:nth-child(4){animation-delay:1.2s;}

footer{
  position:fixed;bottom:12px;left:0;right:0;z-index:2;text-align:center;
  font-size:11.5px;color:#7a6a52;letter-spacing:2px;
}

@keyframes rise{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
@keyframes floaty{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}
@keyframes glowPulse{0%,100%{text-shadow:0 0 34px rgba(255,136,0,.55),0 0 90px rgba(255,136,0,.25),0 4px 0 #5a2a00;}
  50%{text-shadow:0 0 46px rgba(255,160,20,.75),0 0 120px rgba(255,136,0,.35),0 4px 0 #5a2a00;}}
@keyframes btnBreath{0%,100%{box-shadow:0 6px 24px rgba(255,136,0,.4),inset 0 1px 0 rgba(255,255,255,.5);}
  50%{box-shadow:0 6px 34px rgba(255,136,0,.65),inset 0 1px 0 rgba(255,255,255,.5);}}

@media (max-height:600px){
  #cast{display:none;}
  #menu{margin-top:24px;}
}
</style>
<link rel="manifest" href="/manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#ff8800">
</head>
<body>
<div id="bg"></div>
<canvas id="fx"></canvas>

<div id="wrap">
  <div id="logo">
    <div class="badge">기술·가정 융합 에너지 게임</div>
    <h1><span class="bolt">⚡</span> 에너지 퀘스트</h1>
    <div class="en">E N E R G Y &nbsp; Q U E S T</div>
    <div class="theme">다크에너지를 막아라! <b>공학자의 에너지 탈환 대작전</b></div>
  </div>

  <div id="menu">
    <button class="btn" id="btn-new" onclick="newGame()">▶ 새 게임</button>
    <button class="btn" id="btn-continue" onclick="continueGame()">이어하기</button>
    <div id="save-info"></div>
  </div>

  <div id="cast">
    <img src="assets/char/char_haetsal.png"  alt="햇살">
    <img src="assets/char/char_nari.png"     alt="나리">
    <img src="assets/char/char_nuri.png"     alt="누리">
    <img src="assets/char/char_saebyeok.png" alt="새벽">
  </div>
</div>

<footer>DEC로부터 세계를 구하라 · ENERGY QUEST</footer>

<script>
// ── 저장 확인 ──
var hasSave=false;
window.onload=function(){
  var lv=localStorage.getItem('eq_level');
  var s1=localStorage.getItem('eq_stage1_cleared');
  var ch=localStorage.getItem('eq_char_id');
  hasSave=!!(s1||lv||ch);
  if(hasSave){
    document.getElementById('btn-continue').style.display='block';
    document.getElementById('save-info').textContent='저장된 모험이 있어요 — 이어서 세계를 구하세요!';
  }
};
function newGame(){
  if(hasSave && !confirm('저장된 기록이 있습니다.\n새 게임을 시작하면 기존 기록이 삭제됩니다. 계속할까요?'))return;
  localStorage.clear();
  window.location.href='character-select.html';
}
function continueGame(){
  // 클리어된 가장 최근 스테이지의 다음 스테이지로 (최대 6)
  var next=1;
  for(var i=5;i>=1;i--){
    if(localStorage.getItem('eq_stage'+i+'_cleared')==='1'){ next=Math.min(i+1,6); break; }
  }
  window.location.href='stage'+next+'.html';
}
document.addEventListener('keydown',function(e){
  if(e.key==='Enter'){ hasSave?continueGame():newGame(); }
});

// ── 떠오르는 불씨/빛 입자 ──
(function(){
  var cv=document.getElementById('fx'),ctx=cv.getContext('2d');
  function rs(){cv.width=innerWidth;cv.height=innerHeight;}
  rs();addEventListener('resize',rs);
  var P=[];
  for(var i=0;i<46;i++)P.push({
    x:Math.random(),y:Math.random(),
    r:0.8+Math.random()*1.9,
    s:0.0004+Math.random()*0.0009,
    ph:Math.random()*6.283,
    warm:Math.random()>0.35
  });
  (function loop(){
    ctx.clearRect(0,0,cv.width,cv.height);
    var t=Date.now()/1000;
    for(var i=0;i<P.length;i++){
      var p=P[i];
      p.y-=p.s; if(p.y<-0.04)p.y=1.04;
      var x=(p.x+Math.sin(t*0.5+p.ph)*0.012)*cv.width;
      var a=0.12+0.22*((Math.sin(t*1.4+p.ph)+1)/2);
      ctx.fillStyle=p.warm?'rgba(255,190,110,'+a+')':'rgba(255,240,210,'+(a*0.8)+')';
      ctx.beginPath();ctx.arc(x,p.y*cv.height,p.r,0,6.283);ctx.fill();
    }
    requestAnimationFrame(loop);
  })();
})();
</script>
<script>if("serviceWorker"in navigator)navigator.serviceWorker.register("/sw.js");</script>
</body>
</html>
